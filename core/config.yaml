audio:
  channels: 1
  device_index: 1
  frame_ms: 30
  sample_rate: 16000
  speech_min_duration_ms: 800
  speech_max_silence_ms: 2000
  vad_sensitivity: 3
  max_speech_duration_s: 15
hotkeys:
  adjust_speed: ctrl+f3
  switch_voice: ctrl+f2
  toggle_listening: ctrl+f1
memory:
  # Memory system configuration
  enabled: true
  max_context_tokens: 2000
  user_profile_tokens: 200
  history_tokens: 500
  long_term_tokens: 300
  conversation_tokens: 500
  max_conversation_messages: 10
  auto_summarize_threshold: 20
  fact_extraction_threshold: 5
  cleanup_days: 30
llm:
  # vLLM OpenAI-compatible server (started by run_vllm.sh in WSL).
  base_url: http://127.0.0.1:8000/v1
  model: Qwen3-8B            # matches --served-model-name in run_vllm.sh
  temperature: 0.7
  max_tokens: 1000
  api_key: EMPTY            # vLLM ignores the key unless --api-key is set
  enable_thinking: false    # Qwen3: disable chain-of-thought for low latency
  request_timeout: 120
stt:
  device: cpu
  language: en
  max_length: 5000
  model: base.en
  step_size: 1000
system:
  auto_start: true
  log_level: INFO
  show_tray: true
tts:
  default_engine: edge
  default_voice: en-GB-LibbyNeural
  # en-US-GuyNeural
  rate: 0.1
  volume: 1.0
wake_word:
  enabled: true
  sensitivity: 0.7
  words: ["so", "hey", "hi", "emm"]
core:
  # WebSocket bind address for the core service.
  # Must be 0.0.0.0 so WSL2 localhost-forwarding lets Windows reach it.
  host: 0.0.0.0
  port: 8765
